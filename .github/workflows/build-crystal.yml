name: Build Crystal Latest With Database

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  CONFIGURATION: "Release"
  RUNTIME: "win-x64"
  DATABASE_NAME: "Jev"

jobs:
  build:
    name: Build Crystal Client Server Tools
    runs-on: windows-latest

    steps:
      - name: Checkout Crystal source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Crystal.Database
        uses: actions/checkout@v4
        with:
          repository: Suprcode/Crystal.Database
          path: Crystal.Database
          fetch-depth: 1

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show .NET info
        shell: pwsh
        run: |
          dotnet --info

      - name: Restore required projects only
        shell: pwsh
        run: |
          dotnet restore "Client/Client.csproj"
          dotnet restore "Server.MirForms/Server.csproj"

          $toolProjects = @(
            "LibraryEditor/LibraryEditor.csproj",
            "LibraryViewer/LibraryViewer.csproj",
            "AutoPatcherAdmin/AutoPatcherAdmin.csproj"
          )

          foreach ($project in $toolProjects) {
            if (Test-Path $project) {
              dotnet restore $project
            } else {
              Write-Host "Skipping restore for missing project: $project"
            }
          }

      - name: Publish Client
        shell: pwsh
        run: |
          dotnet publish "Client/Client.csproj" -c "${{ env.CONFIGURATION }}" -r "${{ env.RUNTIME }}" --self-contained false -o "artifacts/Crystal-Client"

      - name: Publish Server
        shell: pwsh
        run: |
          dotnet publish "Server.MirForms/Server.csproj" -c "${{ env.CONFIGURATION }}" -r "${{ env.RUNTIME }}" --self-contained false -o "artifacts/Crystal-Server"

      - name: Publish tools if present
        shell: pwsh
        run: |
          $tools = @(
            @{ Path = "LibraryEditor/LibraryEditor.csproj"; Output = "artifacts/Crystal-Tools/LibraryEditor" },
            @{ Path = "LibraryViewer/LibraryViewer.csproj"; Output = "artifacts/Crystal-Tools/LibraryViewer" },
            @{ Path = "AutoPatcherAdmin/AutoPatcherAdmin.csproj"; Output = "artifacts/Crystal-Tools/AutoPatcherAdmin" }
          )

          foreach ($tool in $tools) {
            if (Test-Path $tool.Path) {
              Write-Host "Publishing $($tool.Path)"
              dotnet publish $tool.Path -c "${{ env.CONFIGURATION }}" -r "${{ env.RUNTIME }}" --self-contained false -o $tool.Output
            } else {
              Write-Host "Skipping missing tool project: $($tool.Path)"
            }
          }

      - name: Copy Jev database into Server package
        shell: pwsh
        run: |
          $databasePath = "Crystal.Database/${{ env.DATABASE_NAME }}"

          if (!(Test-Path $databasePath)) {
            Write-Host "Database folder not found: $databasePath"
            Write-Host "Available folders in Crystal.Database:"
            Get-ChildItem "Crystal.Database" -Directory | Select-Object Name
            exit 1
          }

          Copy-Item -Path "$databasePath/*" -Destination "artifacts/Crystal-Server" -Recurse -Force

          Write-Host "Server package after database copy:"
          Get-ChildItem "artifacts/Crystal-Server" | Select-Object Name, Mode, Length

      - name: Create run notes
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $date = Get-Date -Format "yyyy-MM-dd HH:mm:ss"

          $notes = @(
            "Crystal latest build with database",
            "Repository: ${{ github.repository }}",
            "Branch/Tag: ${{ github.ref_name }}",
            "Commit: ${{ github.sha }}",
            "Build time: $date UTC",
            "Runtime: ${{ env.RUNTIME }}",
            "Configuration: ${{ env.CONFIGURATION }}",
            "Database: ${{ env.DATABASE_NAME }}",
            "",
            "How to run locally:",
            "",
            "1. Extract the Server zip to D:\Crystal\Server",
            "2. Extract the Client zip to D:\Crystal\Client",
            "3. Run D:\Crystal\Server\Server.exe once",
            "4. Copy D:\Crystal\Server\Map to D:\Crystal\Client\Maps",
            "5. Open D:\Crystal\Client\Mir2Test.ini",
            "6. Set network to 127.0.0.1 and port 7000",
            "7. Start Server.exe",
            "8. Start Client.exe"
          )

          $notes | Out-File -Encoding UTF8 "artifacts/RUN_NOTES.txt"

          Copy-Item "artifacts/RUN_NOTES.txt" "artifacts/Crystal-Client/RUN_NOTES.txt" -Force
          Copy-Item "artifacts/RUN_NOTES.txt" "artifacts/Crystal-Server/RUN_NOTES.txt" -Force

          if (Test-Path "artifacts/Crystal-Tools") {
            Copy-Item "artifacts/RUN_NOTES.txt" "artifacts/Crystal-Tools/RUN_NOTES.txt" -Force
          }

      - name: Zip artifacts
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)

          Compress-Archive -Path "artifacts/Crystal-Client/*" -DestinationPath "Crystal-Client-$sha.zip" -Force
          Compress-Archive -Path "artifacts/Crystal-Server/*" -DestinationPath "Crystal-Server-With-${{ env.DATABASE_NAME }}-Database-$sha.zip" -Force

          if (Test-Path "artifacts/Crystal-Tools") {
            Compress-Archive -Path "artifacts/Crystal-Tools/*" -DestinationPath "Crystal-Tools-$sha.zip" -Force
          }

      - name: Upload Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crystal-Client-win-x64
          path: Crystal-Client-*.zip
          if-no-files-found: error

      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crystal-Server-With-Jev-Database-win-x64
          path: Crystal-Server-With-Jev-Database-*.zip
          if-no-files-found: error

      - name: Upload Tools artifact
        if: hashFiles('Crystal-Tools-*.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Crystal-Tools-win-x64
          path: Crystal-Tools-*.zip
          if-no-files-found: ignore

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = @(
            Get-ChildItem "Crystal-Client-*.zip",
            Get-ChildItem "Crystal-Server-With-${{ env.DATABASE_NAME }}-Database-*.zip"
          )

          if (Test-Path "Crystal-Tools-*.zip") {
            $files += Get-ChildItem "Crystal-Tools-*.zip"
          }

          gh release create "${{ github.ref_name }}" $files.FullName --title "${{ github.ref_name }}" --notes "Auto build from commit ${{ github.sha }} with ${{ env.DATABASE_NAME }} database"
